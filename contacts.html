<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контакти — Elena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbar-placeholder" data-page="contacts"></div>
  <script src="js/navbar.js"></script>

  <section class="page-hero">
    <h1>Контакти</h1>
  </section>

  <div class="page-section">
    <div class="card-wrap">
      <div class="content-card">
        <div class="contact-grid">

          <div class="contact-info">
            <h2 style="margin-bottom: 1.5rem;">Намерете ни</h2>

            <strong>Адрес</strong>
            <p>ул. „Роза" 12, ет. 2<br />София 1000</p>

            <strong>Телефон</strong>
            <p><a href="tel:+359888888888" style="color: inherit; text-decoration: none;">+359 88 888 8888</a></p>

            <strong>Имейл</strong>
            <p><a href="mailto:info@nailpolish.bg" style="color: inherit; text-decoration: none;">info@nailpolish.bg</a></p>

            <strong>Работно време</strong>
            <p>
              Понеделник – Петък: 10:00 – 19:00<br />
              Събота: 10:00 – 17:00<br />
              Неделя: почивен ден
            </p>

            <strong>Следвайте ни</strong>
            <p style="display: flex; gap: 0.75rem; margin-top: 0.4rem;">
              <a href="https://www.facebook.com" target="_blank" rel="noopener"
                 class="nav-btn nav-btn--icon" aria-label="Facebook">
                <i class="fab fa-facebook-f"></i>
              </a>
              <a href="https://www.instagram.com" target="_blank" rel="noopener"
                 class="nav-btn nav-btn--icon" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
              </a>
              <a href="https://wa.me/" target="_blank" rel="noopener"
                 class="nav-btn nav-btn--icon" aria-label="WhatsApp">
                <i class="fab fa-whatsapp"></i>
              </a>
            </p>
          </div>

          <div>
            <h2 style="margin-bottom: 1.5rem;">Изпратете съобщение</h2>
            <form action="#" method="post">
              <div class="form-group">
                <label for="name">Име</label>
                <input type="text" id="name" name="name" placeholder="Вашето име" required />
              </div>
              <div class="form-group">
                <label for="email">Имейл</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required />
              </div>
              <div class="form-group">
                <label for="message">Съобщение</label>
                <textarea id="message" name="message" placeholder="Как можем да ви помогнем?" required></textarea>
              </div>
              <button type="submit" class="submit-btn">Изпрати</button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>


</body>
</html>
