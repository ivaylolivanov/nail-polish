<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Резервирай онлайн — Elena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <img src="data/logo.png" alt="Elena - Студио за красота" class="nav-logo-img" />
    </a>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="nav-btn">Начало</a></li>

      <li class="nav-dropdown">
        <a href="services.html" class="nav-btn">Услуги</a><span class="dropdown-arrow">▾</span>
        <ul class="dropdown-menu">
          <li><a href="services.html#face">Грижа за лице</a></li>
          <li><a href="services.html#body">Грижа за тяло</a></li>
        </ul>
      </li>

      <li><a href="pricelist.html" class="nav-btn">Ценоразпис</a></li>
      <li><a href="booking.html" class="nav-btn nav-btn--active">Резервирай онлайн</a></li>
      <li><a href="contacts.html" class="nav-btn">Контакти</a></li>

      <li>
        <a href="https://www.facebook.com" target="_blank" rel="noopener"
           class="nav-btn nav-btn--icon" aria-label="Facebook">
          <i class="fab fa-facebook-f"></i>
        </a>
      </li>
      <li>
        <a href="https://www.instagram.com" target="_blank" rel="noopener"
           class="nav-btn nav-btn--icon" aria-label="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
      </li>
      <li>
        <a href="https://wa.me/" target="_blank" rel="noopener"
           class="nav-btn nav-btn--icon" aria-label="WhatsApp">
          <i class="fab fa-whatsapp"></i>
        </a>
      </li>
    </ul>

    <button class="nav-hamburger" id="hamburger" aria-label="Меню">&#9776;</button>
  </nav>

  <section class="page-hero">
    <h1>Резервирай онлайн</h1>
  </section>

  <div class="page-section">
    <div class="card-wrap">
      <div class="rect-accent"></div>
      <div class="content-card">
        <h2>Запазете своя час</h2>
        <p>Попълнете формата по-долу и ние ще се свържем с вас за потвърждение в рамките на 24 часа.</p>

        <form action="#" method="post" style="margin-top: 1.5rem;">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Три имена</label>
              <input type="text" id="name" name="name" placeholder="Иван Иванов" required />
            </div>
            <div class="form-group">
              <label for="phone">Телефон</label>
              <input type="tel" id="phone" name="phone" placeholder="+359 88 888 8888" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Имейл адрес</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" />
          </div>

          <div class="form-group">
            <label for="service">Услуга</label>
            <select id="service" name="service" required>
              <option value="" disabled selected>Изберете услуга</option>
              <optgroup label="Грижа за лице">
                <option>Почистване на лице</option>
                <option>Дълбоко почистване с пара</option>
                <option>Анти-ейдж терапия</option>
                <option>Хидратираща маска</option>
                <option>Пилинг</option>
                <option>Микродермабразио</option>
                <option>Мезотерапия</option>
                <option>RF лифтинг</option>
              </optgroup>
              <optgroup label="Грижа за тяло">
                <option>Релаксиращ масаж</option>
                <option>Антицелулитна терапия</option>
                <option>Ваксиране</option>
                <option>Лазерна епилация</option>
                <option>Обвивания с водорасли</option>
                <option>Лимфен дренаж</option>
                <option>Кавитация</option>
                <option>Прессотерапия</option>
              </optgroup>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="date">Предпочитана дата</label>
              <input type="date" id="date" name="date" required />
            </div>
            <div class="form-group">
              <label for="time">Предпочитан час</label>
              <input type="time" id="time" name="time" min="09:00" max="19:00" />
            </div>
          </div>

          <div class="form-group">
            <label for="notes">Допълнителни бележки</label>
            <textarea id="notes" name="notes" placeholder="Ако имате специфични изисквания или въпроси, напишете ги тук..."></textarea>
          </div>

          <button type="submit" class="submit-btn">Изпрати заявката</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
  </script>

</body>
</html>
